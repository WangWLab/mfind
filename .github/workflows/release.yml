name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., v0.1.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: swatinem/rust-cache@v2

      - name: Build Release
        run: cargo build --release -p mfind-gui --verbose

      - name: List build artifacts
        run: |
          ls -la target/release/
          ls -la target/release/bundle/macos/ || true

      - name: Create DMG
        run: |
          APP_PATH="target/release/bundle/macos/mfind.app"
          DMG_PATH="target/release/bundle/macos/mfind.dmg"
          if [ -d "$APP_PATH" ]; then
            ln -s /Applications "target/release/bundle/macos/Applications"
            hdiutil create -volname "mfind" -srcfolder "target/release/bundle/macos" -ov -format UDZO "$DMG_PATH"
          fi

      - name: Upload macOS app
        uses: actions/upload-artifact@v4
        with:
          name: mfind-macos-app
          path: target/release/bundle/macos/mfind.app
          retention-days: 30

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: mfind-macos-dmg
          path: target/release/bundle/macos/mfind.dmg
          retention-days: 30

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build Release
        run: cargo build --release -p mfind-gui --verbose

      - name: List build artifacts
        run: |
          ls -la target/release/
          ls -la target/release/bundle/linux/ || true

      - name: Upload Debian package
        uses: actions/upload-artifact@v4
        with:
          name: mfind-linux-deb
          path: target/release/bundle/linux/deb/*.deb
          retention-days: 30

      - name: Upload RPM package
        uses: actions/upload-artifact@v4
        with:
          name: mfind-linux-rpm
          path: target/release/bundle/linux/rpm/*.rpm
          retention-days: 30

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: mfind-linux-appimage
          path: target/release/bundle/linux/appimage/*.AppImage
          retention-days: 30

  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: swatinem/rust-cache@v2

      - name: Install Webview2
        run: |
          winget install Microsoft.WebView2

      - name: Build Release
        run: cargo build --release -p mfind-gui --verbose

      - name: List build artifacts
        run: |
          ls target/release/
          ls target/release/bundle/windows/ -Recurse || true

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: mfind-windows-msi
          path: target/release/bundle/windows/msi/*.msi
          retention-days: 30

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: mfind-windows-exe
          path: target/release/bundle/windows/nsis/*.exe
          retention-days: 30

  build-cli:
    name: Build CLI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: swatinem/rust-cache@v2

      - name: Build Release
        run: cargo build --release -p mfind-cli --verbose

      - name: Upload Linux CLI
        uses: actions/upload-artifact@v4
        with:
          name: mfind-cli-linux
          path: target/release/mfind
          retention-days: 30

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-macos, build-linux, build-windows, build-cli]

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Get version from tag
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: mfind ${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/mfind-macos-dmg/mfind.dmg
            artifacts/mfind-linux-deb/**/*.deb
            artifacts/mfind-linux-rpm/**/*.rpm
            artifacts/mfind-linux-appimage/**/*.AppImage
            artifacts/mfind-windows-msi/**/*.msi
            artifacts/mfind-windows-exe/**/*.exe
            artifacts/mfind-cli-linux/mfind
