name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., v0.1.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Cargo
        uses: swatinem/rust-cache@v2

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

      - name: Build Release
        run: |
          cargo build --release -p mfind-gui --verbose

      - name: List build artifacts
        run: |
          ls -la target/release/
          ls -la target/release/bundle/macos/ || true

      - name: Create DMG
        run: |
          # Create a simple DMG
          APP_PATH="target/release/bundle/macos/mfind.app"
          DMG_PATH="target/release/bundle/macos/mfind.dmg"

          if [ -d "$APP_PATH" ]; then
            echo "Creating DMG..."
            ln -s /Applications "target/release/bundle/macos/Applications"
            hdiutil create -volname "mfind" -srcfolder "target/release/bundle/macos" -ov -format UDZO "$DMG_PATH"
            echo "DMG created: $DMG_PATH"
          else
            echo "Warning: App bundle not found at $APP_PATH"
          fi

      - name: Upload macOS app
        uses: actions/upload-artifact@v4
        with:
          name: mfind-macos-app
          path: target/release/bundle/macos/mfind.app
          retention-days: 30

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: mfind-macos-dmg
          path: target/release/bundle/macos/mfind.dmg
          retention-days: 30

      - name: Upload CLI
        uses: actions/upload-artifact@v4
        with:
          name: mfind-cli
          path: target/release/mfind
          retention-days: 30

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-macos]

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download macOS app
        uses: actions/download-artifact@v4
        with:
          name: mfind-macos-app
          path: artifacts/macos-app

      - name: Download macOS DMG
        uses: actions/download-artifact@v4
        with:
          name: mfind-macos-dmg
          path: artifacts/macos-dmg

      - name: Download CLI
        uses: actions/download-artifact@v4
        with:
          name: mfind-cli
          path: artifacts/cli

      - name: Create Release Archive
        run: |
          cd artifacts
          tar -czf mfind-macos-app.tar.gz macos-app/
          tar -czf mfind-cli.tar.gz cli/mfind
          ls -la

      - name: Get version from tag
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: mfind ${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/macos-dmg/mfind.dmg
            artifacts/cli.tar.gz

      - name: Attach files to Release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          files: |
            artifacts/mfind-macos-app.tar.gz
            artifacts/mfind-cli.tar.gz
